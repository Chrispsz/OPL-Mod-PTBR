# =============================================================================
# release.yml — Cria um Release do GitHub quando uma tag v* é empurrada
#
# Uso:
#   git tag v1.2.0-Beta-ptbr.2
#   git push origin v1.2.0-Beta-ptbr.2
#
# O workflow:
#   1. Compila o OPL com os mods PT-BR + Performance
#   2. Baixa o uLaunchELF mais atual do repo oficial ps2homebrew/wLaunchELF
#   3. Gera um ZIP supercomprimido contendo apenas:
#      - OPNPS2LD.ELF (OPL com PT-BR embutido)
#      - BOOT.ELF (uLaunchELF)
#   4. Cria um Release no GitHub anexando o ZIP
# =============================================================================
name: Release OPL PT-BR Mod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.2.0-Beta-ptbr.2)'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest

    steps:
      - name: Checkout mod repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # python3 + zip + git + curl para baixar uLaunchELF da API do GitHub
          apk add --no-cache python3 py3-yaml zip git bash make curl

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Clone upstream OPL
        run: |
          git clone --depth 1 https://github.com/ps2homebrew/Open-PS2-Loader.git opl
          echo "UPSTREAM_SHA=$(cd opl && git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Apply mods
        run: bash scripts/apply-mods.sh opl

      - name: Build OPL
        working-directory: opl
        run: make -j"$(nproc)" NOT_PACKED=0 DEBUG=0 PADEMU=0

      - name: Verify OPL ELF
        run: |
          # Validar que o ELF foi gerado e é um ELF MIPS válido
          ls -lh opl/OPNPS2LD.ELF
          head -c 4 opl/OPNPS2LD.ELF | od -An -tx1 | grep -q "7f 45 4c 46" || {
            echo "ERRO: OPNPS2LD.ELF não é um ELF válido!"
            exit 1
          }
          echo "✅ OPNPS2LD.ELF é um ELF válido"

      - name: Download latest uLaunchELF from upstream
        run: |
          # Baixar o BOOT.ELF do release "latest" do ps2homebrew/wLaunchELF
          # Sem auth — endpoint público
          echo "==> Baixando uLaunchELF (BOOT.ELF) do release latest..."
          curl -fL --retry 3 -o BOOT.ELF \
            https://github.com/ps2homebrew/wLaunchELF/releases/download/latest/BOOT.ELF

          # Validar
          ls -lh BOOT.ELF
          head -c 4 BOOT.ELF | od -An -tx1 | grep -q "7f 45 4c 46" || {
            echo "ERRO: BOOT.ELF não é um ELF válido!"
            exit 1
          }
          echo "✅ BOOT.ELF (uLaunchELF) é um ELF válido"

          # Capturar SHA do commit do uLaunchELF para referência
          ULE_SHA=$(curl -sf https://api.github.com/repos/ps2homebrew/wLaunchELF/commits/main \
                    | python3 -c "import json,sys;print(json.load(sys.stdin)['sha'][:7])" 2>/dev/null || echo "unknown")
          echo "ULE_SHA=${ULE_SHA}" >> $GITHUB_ENV
          echo "uLaunchELF SHA: ${ULE_SHA}"

      - name: Create minimal kit (only OPL + uLaunchELF)
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          PKG_DIR="OPL-PTBR-Mod-${TAG}"
          mkdir -p "${PKG_DIR}"

          # Só 2 arquivos: OPL + uLaunchELF
          cp opl/OPNPS2LD.ELF "${PKG_DIR}/"
          cp BOOT.ELF "${PKG_DIR}/"

          ls -lh "${PKG_DIR}/"

      - name: Create supercompressed ZIP
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          PKG_DIR="OPL-PTBR-Mod-${TAG}"
          ZIP_FILE="${PKG_DIR}.zip"

          # Supercompressão: zip -9 + deflate máximo
          # -9 = máxima compressão deflate
          # -X = não guardar atributos de arquivo extras (menor overhead)
          # --best = alias para -9
          zip -9 -X -r "${ZIP_FILE}" "${PKG_DIR}/"

          # Alternativa: usar 7z (se disponível) com LZMA2 para compressão ainda maior
          # Mas Alpine não vem com 7z por padrão, e o ganho em ELFs (binários) é pequeno
          # porque ELF já é binário comprimido (ps2-packer já fez o trabalho)

          ls -lh "${ZIP_FILE}"
          echo "PKG_FILE=${ZIP_FILE}" >> $GITHUB_ENV

          # Calcular tamanho antes/depois para mostrar no release notes
          RAW_SIZE=$(du -b "${PKG_DIR}/OPNPS2LD.ELF" "${PKG_DIR}/BOOT.ELF" | tail -1 | cut -f1)
          ZIP_SIZE=$(stat -c%s "${ZIP_FILE}")
          RATIO=$(python3 -c "print(f'{$ZIP_SIZE/$RAW_SIZE*100:.1f}')")
          echo "Tamanho raw: $((RAW_SIZE/1024)) KB"
          echo "Tamanho ZIP: $((ZIP_SIZE/1024)) KB"
          echo "Ratio: ${RATIO}% do original"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: OPL PT-BR Mod ${{ steps.tag.outputs.name }}
          body: |
            # OPL PT-BR Mod ${{ steps.tag.outputs.name }}

            ## 📦 Conteúdo do kit (mínimo, só o essencial)

            | Arquivo | O que é |
            |---------|---------|
            | `OPNPS2LD.ELF` | OPL v1.2.0-Beta com PT-BR embutido + perfil Performance |
            | `BOOT.ELF` | uLaunchELF mais atual (baixado automaticamente do [ps2homebrew/wLaunchELF](https://github.com/ps2homebrew/wLaunchELF/releases/latest)) |

            Tudo já vem configurado. Não precisa de arquivos de idioma, fontes ou config externos.

            ## ✅ O que já vem pronto

            - 🇧🇷 PT-BR embutido no ELF (idioma padrão)
            - ⚡ Perfil Performance (caches grandes, write on, art on, SFX on, scroll rápido)
            - 🔌 USB ativo no boot (vai direto pra lista de jogos)
            - 🎮 IGR + VMC ativos
            - 💾 Suporte a FAT12, FAT16, FAT32 e exFAT
            - 🪶 Build enxuta: PADEMU, GSM, IGS, ILINK, MX4SIO, RTL desativados

            ## 🚀 Instalação rápida

            1. Descompacte o ZIP no computador
            2. Copie `OPNPS2LD.ELF` e `BOOT.ELF` para um pendrive (FAT32 ou exFAT)
            3. No PS2 com FreeMcBoot, abra o uLaunchELF
            4. Copie `OPNPS2LD.ELF` para `mc0:/OPL/` e `BOOT.ELF` para `mc0:/BOOT/`
            5. Reinicie — OPL e uLaunchELF aparecerão no menu do FMCB

            ## ⌨️ Combo IGR

            `L1 + R1 + L2 + R2 + Start + Select` — volta ao OPL sem desligar o console.

            ## 🛠️ Build details

            - **OPL upstream SHA:** `${{ env.UPSTREAM_SHA }}`
            - **uLaunchELF SHA:** `${{ env.ULE_SHA }}`
            - **Mod repo SHA:** `${{ github.sha }}`
            - **Build date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')

            ---

            Builds anteriores: https://github.com/${{ github.repository }}/releases
          files: ${{ env.PKG_FILE }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-beta') || contains(steps.tag.outputs.name, '-rc') }}
