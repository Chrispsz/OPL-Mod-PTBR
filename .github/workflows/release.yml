# =============================================================================
# release.yml — Cria um Release do GitHub quando uma tag v* é empurrada
#
# Uso:
#   git tag v1.2.0-Beta-ptbr.3
#   git push origin v1.2.0-Beta-ptbr.3
#
# O workflow:
#   1. Compila o OPL com os mods PT-BR + Performance (do branch main do upstream)
#   2. Baixa o uLaunchELF mais atual (tag "latest" do ps2homebrew/wLaunchELF,
#      que é uma tag móvel atualizada pelo CI deles a cada commit no main)
#   3. Captura metadados: SHAs, datas, versões (em steps separados, não inline)
#   4. Gera um ZIP supercomprimido contendo apenas:
#      - OPNPS2LD.ELF (OPL com PT-BR embutido)
#      - BOOT.ELF (uLaunchELF)
#   5. Cria um Release PRE-RELEASE no GitHub anexando o ZIP
#
# TODAS as releases são marcadas como pre-release (build de desenvolvimento).
# =============================================================================
name: Release OPL PT-BR Mod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.2.0-Beta-ptbr.3)'
        required: true
        default: 'v1.2.0-Beta-ptbr.3'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest

    steps:
      - name: Checkout mod repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk add --no-cache python3 py3-yaml zip git bash make curl

      - name: Capture build metadata
        id: meta
        run: |
          # Tag do release
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          # Build date em UTC (gerado AQUI, antes do action-gh-release, que não interpreta shell)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

      - name: Clone upstream OPL (branch main — mais atual)
        run: |
          # --depth 1 pega o commit HEAD do branch main (default) do upstream
          git clone --depth 1 https://github.com/ps2homebrew/Open-PS2-Loader.git opl
          UPSTREAM_SHA=$(cd opl && git rev-parse HEAD)
          UPSTREAM_SHORT="${UPSTREAM_SHA:0:7}"

          # Pegar data do commit upstream
          UPSTREAM_DATE=$(cd opl && git log -1 --format=%cd --date=format:'%Y-%m-%d')

          # Pegar versão OPL
          OPL_VERSION=$(cd opl && make oplversion 2>/dev/null || echo "unknown")

          echo "UPSTREAM_SHA=${UPSTREAM_SHA}" >> $GITHUB_ENV
          echo "UPSTREAM_SHORT=${UPSTREAM_SHORT}" >> $GITHUB_ENV
          echo "UPSTREAM_DATE=${UPSTREAM_DATE}" >> $GITHUB_ENV
          echo "OPL_VERSION=${OPL_VERSION}" >> $GITHUB_ENV

          echo "==> Upstream:"
          echo "    SHA:     ${UPSTREAM_SHORT}"
          echo "    Date:    ${UPSTREAM_DATE}"
          echo "    Version: ${OPL_VERSION}"

      - name: Apply mods
        run: bash scripts/apply-mods.sh opl

      - name: Build OPL
        working-directory: opl
        run: make -j"$(nproc)" NOT_PACKED=0 DEBUG=0 PADEMU=0

      - name: Verify OPL ELF
        run: |
          ls -lh opl/OPNPS2LD.ELF
          head -c 4 opl/OPNPS2LD.ELF | od -An -tx1 | grep -q "7f 45 4c 46" || {
            echo "ERRO: OPNPS2LD.ELF não é um ELF válido!"
            exit 1
          }
          echo "✅ OPNPS2LD.ELF é um ELF MIPS válido"

      - name: Download latest uLaunchELF
        id: ule
        run: |
          # Tag "latest" do ps2homebrew/wLaunchELF é uma tag MÓVEL atualizada
          # automaticamente pelo CI deles a cada push no branch main.
          # É pre-release (build de desenvolvimento) — exatamente o que queremos.
          echo "==> Baixando uLaunchELF (BOOT.ELF) da tag latest..."
          curl -fL --retry 3 -o BOOT.ELF \
            https://github.com/ps2homebrew/wLaunchELF/releases/download/latest/BOOT.ELF

          ls -lh BOOT.ELF
          head -c 4 BOOT.ELF | od -An -tx1 | grep -q "7f 45 4c 46" || {
            echo "ERRO: BOOT.ELF não é um ELF válido!"
            exit 1
          }
          echo "✅ BOOT.ELF (uLaunchELF) é um ELF MIPS válido"

          # Capturar SHA do último commit do branch main do wLaunchELF
          # (a tag "latest" aponta pro mesmo commit, mas a API /releases/latest
          #  retorna a última estável de 2019, então usamos a API de commits)
          ULE_SHA=$(curl -sf https://api.github.com/repos/ps2homebrew/wLaunchELF/commits/master \
                    | python3 -c "import json,sys;print(json.load(sys.stdin)['sha'])" 2>/dev/null || echo "")
          if [ -z "${ULE_SHA}" ]; then
            # Fallback: tentar pegar o SHA da tag "latest" diretamente
            ULE_SHA=$(curl -sf https://api.github.com/repos/ps2homebrew/wLaunchELF/git/refs/tags/latest \
                      | python3 -c "import json,sys;print(json.load(sys.stdin)['object']['sha'])" 2>/dev/null || echo "unknown")
          fi
          ULE_SHORT="${ULE_SHA:0:7}"

          # Pegar data do commit
          ULE_DATE=$(curl -sf https://api.github.com/repos/ps2homebrew/wLaunchELF/commits/master \
                     | python3 -c "import json,sys;print(json.load(sys.stdin)['commit']['author']['date'][:10])" 2>/dev/null || echo "unknown")

          echo "ule_sha=${ULE_SHA}" >> $GITHUB_OUTPUT
          echo "ule_short=${ULE_SHORT}" >> $GITHUB_OUTPUT
          echo "ule_date=${ULE_DATE}" >> $GITHUB_OUTPUT

          echo ""
          echo "==> uLaunchELF:"
          echo "    SHA:  ${ULE_SHORT}"
          echo "    Date: ${ULE_DATE}"

      - name: Create minimal kit (only OPL + uLaunchELF)
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PKG_DIR="OPL-PTBR-Mod-${TAG}"
          mkdir -p "${PKG_DIR}"

          # Só 2 arquivos: OPL + uLaunchELF
          cp opl/OPNPS2LD.ELF "${PKG_DIR}/"
          cp BOOT.ELF "${PKG_DIR}/"

          ls -lh "${PKG_DIR}/"

      - name: Create supercompressed ZIP
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PKG_DIR="OPL-PTBR-Mod-${TAG}"
          ZIP_FILE="${PKG_DIR}.zip"

          # Supercompressão: -9 (máxima deflate) + -X (sem atributos extras)
          zip -9 -X -r "${ZIP_FILE}" "${PKG_DIR}/"

          ls -lh "${ZIP_FILE}"
          echo "PKG_FILE=${ZIP_FILE}" >> $GITHUB_ENV

      - name: Create GitHub Release (always pre-release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: OPL PT-BR Mod ${{ steps.meta.outputs.tag }}
          body: |
            # OPL PT-BR Mod ${{ steps.meta.outputs.tag }}

            ## 📦 Conteúdo do kit (mínimo, só o essencial)

            | Arquivo | O que é |
            |---------|---------|
            | `OPNPS2LD.ELF` | OPL ${{ env.OPL_VERSION }} com PT-BR embutido + perfil Performance |
            | `BOOT.ELF` | uLaunchELF mais atual (tag `latest` do [ps2homebrew/wLaunchELF](https://github.com/ps2homebrew/wLaunchELF/releases/tag/latest)) |

            Tudo já vem configurado. Não precisa de arquivos de idioma, fontes ou config externos.

            ## ✅ O que já vem pronto

            - 🇧🇷 PT-BR embutido no ELF (idioma padrão)
            - ⚡ Perfil Performance (caches grandes, write on, art on, SFX on, scroll rápido)
            - 🔌 USB ativo no boot (vai direto pra lista de jogos)
            - 🎮 IGR + VMC ativos
            - 💾 Suporte a FAT12, FAT16, FAT32 e exFAT
            - 🪶 Build enxuta: PADEMU, GSM, IGS, ILINK, MX4SIO, RTL desativados

            ## 🚀 Instalação rápida

            1. Descompacte o ZIP no computador
            2. Copie `OPNPS2LD.ELF` e `BOOT.ELF` para um pendrive (FAT32 ou exFAT)
            3. No PS2 com FreeMcBoot, abra o uLaunchELF
            4. Copie `OPNPS2LD.ELF` para `mc0:/OPL/` e `BOOT.ELF` para `mc0:/BOOT/`
            5. Reinicie — OPL e uLaunchELF aparecerão no menu do FMCB

            ## ⌨️ Combo IGR

            `L1 + R1 + L2 + R2 + Start + Select` — volta ao OPL sem desligar o console.

            ## 🛠️ Build details

            | Componente | SHA | Data |
            |------------|-----|------|
            | OPL upstream (branch main) | `${{ env.UPSTREAM_SHORT }}` | ${{ env.UPSTREAM_DATE }} |
            | uLaunchELF (tag latest) | `${{ steps.ule.outputs.ule_short }}` | ${{ steps.ule.outputs.ule_date }} |
            | Mod repo (este) | `${{ github.sha }}` | — |
            | Build date | — | ${{ steps.meta.outputs.build_date }} |

            **Versão OPL:** ${{ env.OPL_VERSION }}

            ---

            Builds anteriores: https://github.com/${{ github.repository }}/releases
          files: ${{ env.PKG_FILE }}
          draft: false
          prerelease: true   # Sempre pre-release (build de desenvolvimento)
          make_latest: false # Não marcar como "Latest" no GitHub (evita confusão)
