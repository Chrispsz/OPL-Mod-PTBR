# =============================================================================
# conf_opl.cfg — Configuração OPL pré-definida
# Perfil: Performance + USB-default + PT-BR + IGR + VMC
#
# Este arquivo é OPCIONAL. Todas as configurações abaixo já estão embutidas
# como defaults no ELF compilado. Coloque este arquivo em mc?:/OPL/conf_opl.cfg
# APENAS se quiser forçar essas settings no primeiro boot (sobrescrevendo
# qualquer config salva anteriormente).
#
# Formato: chave=valor (uma por linha). Linhas com # são comentários.
# =============================================================================

# Idioma — PT-BR (já embutido no ELF; este .lng externo é opcional)
language_text=Portuguese_BR

# Tema padrão (OPL embutido). Para tema próprio, coloque theme_<nome>.zip em mc?:/OPL/
theme=Default

# Dispositivo padrão: 0=BDM(USB), 5=ETH, 6=HDD, 7=APP. USB = universal.
default_device=0

# Modos de inicialização: 0=Desativado, 1=Manual, 2=Auto
usb_mode=2     # USB (BDM) auto — única fonte ativa por padrão
hdd_mode=0     # HDD desativado (reativável via Settings se tiver PS2 Fat)
eth_mode=0     # ETH/SMB desativado (reativável via Settings se tiver rede)
app_mode=0     # Apps desativado (reativável via Settings)

# Caches CDVD (número de setores em cache) — perfil Performance
bdm_cache=32
hdd_cache=16
smb_cache=32

# Spindown do HDD (segundos) — só importa se HDD for reativado
hdd_spindown=20

# UX / Visual — perfil Performance + Bonito
autosort=1
autorefresh=1
scrolling=2              # 0=Lenta, 1=Média, 2=Rápida
enable_notifications=1
enable_coverart=1
wide_screen=1
vmode=0                  # 0=Auto, 1=PAL, 2=NTSC
xoff=0
yoff=0
overscan=0

# Debug / Logo
disable_debug=1          # 1 = desativar cores de debug (perfil performance)
ps2logo=0                # 0 = não exibir logo PS2 ao iniciar jogos
hdd_game_list_cache=1    # 1 = cachear lista de jogos HDD (boot mais rápido)

# Write/Delete/Rename — permite gerenciar jogos/configs pelo OPL
enable_delete_rename=1

# Last Played Auto Start — lembra do último jogo e inicia após N segundos
remember_last=1
autostart_last=9         # 0=desativado, ou 1-99 segundos

# Prefixos de pasta (deixe vazio para defaults)
usb_prefix=
eth_prefix=

# BDM extras (iLink, mx4sio, bdm_hdd) — todos desativados nesta build
enable_ilink=0
enable_mx4sio=0
enable_bdm_hdd=0

# Swap Select/Button: 0=X confirma (padrão Japão), 1=O confirma (padrão USA)
swap_select_btn=0

# Áudio — perfil Performance
enable_sfx=1
enable_boot_snd=1
enable_bgm=0
sfx_volume=100
boot_snd_volume=100
bgm_volume=70

# Senha do parental lock (em branco = desativado)
parental_lock_password=
